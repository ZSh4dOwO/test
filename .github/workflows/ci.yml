name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify .env.example is in sync with .env
        run: |
          # Extract variable names from both files (ignore comments and blank lines)
          env_vars=$(grep -v '^#' .env | grep -v '^$' | cut -d= -f1 | sort)
          example_vars=$(grep -v '^#' .env.example | grep -v '^$' | cut -d= -f1 | sort)
          if [ "$env_vars" != "$example_vars" ]; then
            echo "::error::.env and .env.example have different variable names"
            echo "In .env:         $env_vars"
            echo "In .env.example: $example_vars"
            exit 1
          fi
          echo ".env.example is in sync with .env"

      - name: Validate docker-compose config
        run: |
          cp .env.example .env.ci
          docker compose --env-file .env.ci config --quiet
          echo "docker-compose config is valid"

      - name: Build Docker images
        run: |
          cp .env.example .env.ci
          docker compose --env-file .env.ci build
